<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Royal Chess Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        #menu-toggle:checked ~ #mobile-menu { display: block !important; }
    </style>
</head>
<body class="bg-[#0F172A] text-gray-100 font-sans">

    <nav class="bg-[#0F172A]/90 backdrop-blur-md py-4 lg:px-12 border-b border-[#334155]">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="index.html" class="font-semibold text-xl tracking-tight text-amber-400 hover:text-white">♟️ Royal Chess Club</a>
            <a href="index.html" class="text-gray-300 hover:text-amber-400 text-sm">Back to Site</a>
        </div>
    </nav>

    <div class="py-12">
        <div class="container mx-auto px-6 max-w-4xl">
            <h1 class="text-3xl font-bold text-center text-white mb-8">Admin Panel</h1>

            <div id="loginForm" class="bg-[#1E293B] border border-[#334155] rounded-xl p-8 max-w-md mx-auto">
                <h2 class="text-xl font-bold text-white mb-4">Admin Login</h2>
                <input type="password" id="adminPassword" placeholder="Enter password" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-3 text-white mb-4">
                <button onclick="login()" class="w-full bg-amber-400 hover:bg-amber-500 text-[#0F172A] font-semibold py-2 rounded-lg transition">Login</button>
                <p id="loginError" class="text-red-400 text-sm mt-2 hidden">Incorrect password</p>
            </div>

            <div id="dashboard" class="hidden space-y-8">
                <div class="bg-[#1E293B] border border-[#334155] rounded-xl p-6">
                    <h2 class="text-2xl font-bold text-white mb-4">Tournaments</h2>
                    <div id="tournamentsListAdmin" class="space-y-4 mb-6"></div>
                    <button onclick="showAddTournamentForm()" class="bg-amber-400 hover:bg-amber-500 text-[#0F172A] px-4 py-2 rounded-lg">+ Add Tournament</button>
                </div>

                <div class="bg-[#1E293B] border border-[#334155] rounded-xl p-6">
                    <h2 class="text-2xl font-bold text-white mb-4">Coaches</h2>
                    <div id="coachesListAdmin" class="space-y-4 mb-6"></div>
                    <button onclick="showAddCoachForm()" class="bg-amber-400 hover:bg-amber-500 text-[#0F172A] px-4 py-2 rounded-lg">+ Add Coach</button>
                </div>

                <div class="bg-[#1E293B] border border-[#334155] rounded-xl p-6">
                    <h2 class="text-2xl font-bold text-white mb-4">Members</h2>
                    <div id="membersListAdmin" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="bg-[#1E293B] border border-[#334155] rounded-xl max-w-md w-full p-6">
            <h3 id="modalTitle" class="text-xl font-bold text-amber-400 mb-4"></h3>
            <div id="modalContent"></div>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeModal()" class="px-4 py-2 bg-[#334155] rounded-lg hover:bg-[#475569]">Cancel</button>
                <button id="modalConfirmBtn" class="px-4 py-2 bg-amber-400 text-[#0F172A] rounded-lg hover:bg-amber-500">Save</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123";
        const TOURNAMENTS_KEY = "chessClub_tournaments";
        const COACHES_KEY = "chessClub_coaches";

        function loadTournaments() {
            let stored = localStorage.getItem(TOURNAMENTS_KEY);
            if (stored) return JSON.parse(stored);
            return [
                { id: 1, name: "Spring Open", date: "2026-04-15T10:00:00", location: "City Hall", prize: "$500" },
                { id: 2, name: "Rapid Championship", date: "2026-05-20T14:00:00", location: "Chess Center", prize: "$300" },
                { id: 3, name: "Blitz Battle", date: "2026-06-10T18:00:00", location: "Online", prize: "$200" },
                { id: 4, name: "Summer Classic", date: "2026-07-25T09:00:00", location: "Grand Hotel", prize: "$1000" },
                { id: 5, name: "Autumn Invitational", date: "2026-09-12T11:00:00", location: "Convention Hall", prize: "$750" },
                { id: 6, name: "Winter Masters", date: "2026-12-05T10:00:00", location: "Royal Ballroom", prize: "$1500" }
            ];
        }

        function loadCoaches() {
            let stored = localStorage.getItem(COACHES_KEY);
            if (stored) return JSON.parse(stored);
            return [
                {
                    id: 1,
                    name: "GM Pia Cramling",
                    title: "Grandmaster & World-Class Competitor",
                    expertise: "Endgames & Strategy",
                    image: "https://placehold.co/400x300/1E293B/FFFFFF?text=GM+Pia",
                    quote: "I've competed at the highest level for over 40 years. My students learn the resilience and precision needed to win.",
                    phone: "+254 712 345 678",
                    email: "piacramling@gmail.com",
                    slots: [
                        { date: "2026-06-10", time: "10:00", booked: false, slotId: "c1_s1" },
                        { date: "2026-06-10", time: "14:00", booked: false, slotId: "c1_s2" },
                        { date: "2026-06-12", time: "16:00", booked: false, slotId: "c1_s3" }
                    ]
                },
                {
                    id: 2,
                    name: "IM Levy Rozman",
                    title: "International Master & Chess Educator",
                    expertise: "Openings & Middle Game",
                    image: "https://placehold.co/400x300/1E293B/FFFFFF?text=IM+Levy",
                    quote: "I've helped millions improve their chess online. Now let me help you – personally – to break through your plateau.",
                    phone: "+254 723 456 789",
                    email: "levyrozman@mail.com",
                    slots: [
                        { date: "2026-06-11", time: "11:00", booked: false, slotId: "c2_s1" },
                        { date: "2026-06-11", time: "15:00", booked: false, slotId: "c2_s2" },
                        { date: "2026-06-13", time: "09:00", booked: false, slotId: "c2_s3" }
                    ]
                },
                {
                    id: 3,
                    name: "WGM Sarah Wambui",
                    title: "Women's Grandmaster & Tactics Expert",
                    expertise: "Tactics & Visualization",
                    image: "https://placehold.co/400x300/1E293B/FFFFFF?text=WGM+Sarah",
                    quote: "Tactics flow from a harmonious position. I'll help you see combinations before they appear.",
                    phone: "+254 734 567 890",
                    email: "sarah.w@royalchess.club",
                    slots: [
                        { date: "2026-06-14", time: "13:00", booked: false, slotId: "c3_s1" },
                        { date: "2026-06-15", time: "10:00", booked: false, slotId: "c3_s2" }
                    ]
                },
                {
                    id: 4,
                    name: "FM David Omondi",
                    title: "FIDE Master & Junior Development Coach",
                    expertise: "Positional Play & Calculation",
                    image: "https://placehold.co/400x300/1E293B/FFFFFF?text=FM+David",
                    quote: "I specialize in turning talented juniors into titled players. Let's build your foundation together.",
                    phone: "+254 745 678 901",
                    email: "david.o@royalchess.club",
                    slots: [
                        { date: "2026-06-16", time: "09:00", booked: false, slotId: "c4_s1" },
                        { date: "2026-06-17", time: "14:00", booked: false, slotId: "c4_s2" }
                    ]
                },
                {
                    id: 5,
                    name: "GM Viswanathan Anand",
                    title: "Former World Champion & Legend",
                    expertise: "All-round Excellence",
                    image: "https://placehold.co/400x300/1E293B/FFFFFF?text=GM+Anand",
                    quote: "Chess is a game of infinite possibilities. I'm here to help you discover your own path to mastery.",
                    phone: "+254 756 789 012",
                    email: "anand@royalchess.club",
                    slots: [
                        { date: "2026-06-18", time: "15:00", booked: false, slotId: "c5_s1" },
                        { date: "2026-06-19", time: "11:00", booked: false, slotId: "c5_s2" }
                    ]
                }
            ];
        }

        let tournaments = [];
        let coaches = [];

        function refreshData() {
            tournaments = loadTournaments();
            coaches = loadCoaches();
        }

        function saveTournaments() {
            localStorage.setItem(TOURNAMENTS_KEY, JSON.stringify(tournaments));
        }

        function saveCoaches() {
            localStorage.setItem(COACHES_KEY, JSON.stringify(coaches));
        }

        function renderTournamentsAdmin() {
            const container = document.getElementById('tournamentsListAdmin');
            if (!container) return;
            if (tournaments.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No tournaments yet.</p>';
                return;
            }
            container.innerHTML = tournaments.map(t => `
                <div class="bg-[#0F172A] p-4 rounded-lg flex justify-between items-center">
                    <div>
                        <p class="font-bold text-white">${t.name}</p>
                        <p class="text-sm text-gray-300">📅 ${new Date(t.date).toLocaleString()}</p>
                        <p class="text-sm text-gray-300">📍 ${t.location} | 🏆 ${t.prize}</p>
                    </div>
                    <div>
                        <button onclick="editTournament(${t.id})" class="text-amber-400 hover:text-white mr-2">Edit</button>
                        <button onclick="deleteTournament(${t.id})" class="text-red-400 hover:text-red-300">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCoachesAdmin() {
            const container = document.getElementById('coachesListAdmin');
            if (!container) return;
            if (coaches.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No coaches yet.</p>';
                return;
            }
            container.innerHTML = coaches.map(c => `
                <div class="bg-[#0F172A] p-4 rounded-lg flex justify-between items-center">
                    <div>
                        <p class="font-bold text-white">${c.name}</p>
                        <p class="text-sm text-gray-300">${c.title}</p>
                        <p class="text-sm text-gray-300">${c.email} | ${c.phone}</p>
                    </div>
                    <div>
                        <button onclick="editCoach(${c.id})" class="text-amber-400 hover:text-white mr-2">Edit</button>
                        <button onclick="deleteCoach(${c.id})" class="text-red-400 hover:text-red-300">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMembersAdmin() {
            const container = document.getElementById('membersListAdmin');
            if (!container) return;
            let members = JSON.parse(localStorage.getItem('chessClub_members')) || [];
            if (members.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No members yet.</p>';
                return;
            }
            container.innerHTML = members.map((m, idx) => `
                <div class="bg-[#0F172A] p-4 rounded-lg flex justify-between items-center">
                    <div>
                        <p class="font-bold text-white">${m.name}</p>
                        <p class="text-sm text-gray-300">${m.email}</p>
                        <p class="text-sm text-gray-300">Rating: ${m.rating || 'N/A'} | Joined: ${new Date(m.registeredAt).toLocaleDateString()}</p>
                    </div>
                    <div>
                        <button onclick="deleteMember(${idx})" class="text-red-400 hover:text-red-300">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                refreshData();
                renderTournamentsAdmin();
                renderCoachesAdmin();
                renderMembersAdmin();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function showAddTournamentForm() {
            document.getElementById('modalTitle').innerText = 'Add Tournament';
            document.getElementById('modalContent').innerHTML = `
                <input type="text" id="tournamentName" placeholder="Name" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="datetime-local" id="tournamentDate" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="tournamentLocation" placeholder="Location" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="tournamentPrize" placeholder="Prize" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 text-white">
            `;
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.onclick = () => {
                const name = document.getElementById('tournamentName').value.trim();
                const date = document.getElementById('tournamentDate').value;
                const location = document.getElementById('tournamentLocation').value.trim();
                const prize = document.getElementById('tournamentPrize').value.trim();
                if (!name || !date || !location || !prize) {
                    alert("Please fill all fields");
                    return;
                }
                const newId = tournaments.length ? Math.max(...tournaments.map(t => t.id)) + 1 : 1;
                tournaments.push({ id: newId, name, date, location, prize });
                saveTournaments();
                renderTournamentsAdmin();
                closeModal();
            };
            openModal();
        }

        function editTournament(id) {
            const tournament = tournaments.find(t => t.id === id);
            if (!tournament) return;
            document.getElementById('modalTitle').innerText = 'Edit Tournament';
            document.getElementById('modalContent').innerHTML = `
                <input type="text" id="tournamentName" value="${tournament.name}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="datetime-local" id="tournamentDate" value="${tournament.date.slice(0,16)}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="tournamentLocation" value="${tournament.location}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="tournamentPrize" value="${tournament.prize}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 text-white">
            `;
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.onclick = () => {
                tournament.name = document.getElementById('tournamentName').value.trim();
                tournament.date = document.getElementById('tournamentDate').value;
                tournament.location = document.getElementById('tournamentLocation').value.trim();
                tournament.prize = document.getElementById('tournamentPrize').value.trim();
                saveTournaments();
                renderTournamentsAdmin();
                closeModal();
            };
            openModal();
        }

        function deleteTournament(id) {
            if (confirm("Delete this tournament?")) {
                tournaments = tournaments.filter(t => t.id !== id);
                saveTournaments();
                renderTournamentsAdmin();
            }
        }

        function showAddCoachForm() {
            document.getElementById('modalTitle').innerText = 'Add Coach';
            document.getElementById('modalContent').innerHTML = `
                <input type="text" id="coachName" placeholder="Name" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="coachTitle" placeholder="Title" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="coachImage" placeholder="Image URL (optional)" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <textarea id="coachQuote" placeholder="Quote" rows="2" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white"></textarea>
                <input type="text" id="coachPhone" placeholder="Phone" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="email" id="coachEmail" placeholder="Email" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 text-white">
                <p class="text-xs text-gray-400 mt-2">Slots can be added later (advanced). Default empty slots will be used.</p>
            `;
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.onclick = () => {
                const name = document.getElementById('coachName').value.trim();
                const title = document.getElementById('coachTitle').value.trim();
                const image = document.getElementById('coachImage').value.trim() || "https://placehold.co/400x300/1E293B/FFFFFF?text=Coach";
                const quote = document.getElementById('coachQuote').value.trim();
                const phone = document.getElementById('coachPhone').value.trim();
                const email = document.getElementById('coachEmail').value.trim();
                if (!name || !title || !phone || !email) {
                    alert("Please fill required fields (Name, Title, Phone, Email)");
                    return;
                }
                const newId = coaches.length ? Math.max(...coaches.map(c => c.id)) + 1 : 1;
                coaches.push({
                    id: newId,
                    name,
                    title,
                    expertise: title,
                    image,
                    quote: quote || "I'm here to help you improve.",
                    phone,
                    email,
                    slots: []
                });
                saveCoaches();
                renderCoachesAdmin();
                closeModal();
            };
            openModal();
        }

        function editCoach(id) {
            const coach = coaches.find(c => c.id === id);
            if (!coach) return;
            document.getElementById('modalTitle').innerText = 'Edit Coach';
            document.getElementById('modalContent').innerHTML = `
                <input type="text" id="coachName" value="${coach.name}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="coachTitle" value="${coach.title}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="text" id="coachImage" value="${coach.image}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <textarea id="coachQuote" rows="2" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">${coach.quote}</textarea>
                <input type="text" id="coachPhone" value="${coach.phone}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 mb-2 text-white">
                <input type="email" id="coachEmail" value="${coach.email}" class="w-full bg-[#0F172A] border border-[#334155] rounded-lg p-2 text-white">
            `;
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.onclick = () => {
                coach.name = document.getElementById('coachName').value.trim();
                coach.title = document.getElementById('coachTitle').value.trim();
                coach.image = document.getElementById('coachImage').value.trim() || "https://placehold.co/400x300/1E293B/FFFFFF?text=Coach";
                coach.quote = document.getElementById('coachQuote').value.trim();
                coach.phone = document.getElementById('coachPhone').value.trim();
                coach.email = document.getElementById('coachEmail').value.trim();
                saveCoaches();
                renderCoachesAdmin();
                closeModal();
            };
            openModal();
        }

        function deleteCoach(id) {
            if (confirm("Delete this coach?")) {
                coaches = coaches.filter(c => c.id !== id);
                saveCoaches();
                renderCoachesAdmin();
            }
        }

        function deleteMember(index) {
            if (confirm("Delete this member?")) {
                let members = JSON.parse(localStorage.getItem('chessClub_members')) || [];
                members.splice(index, 1);
                localStorage.setItem('chessClub_members', JSON.stringify(members));
                renderMembersAdmin();
            }
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
